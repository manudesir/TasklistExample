<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liste de courses — semaine</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f5ef;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #ddd6c7;
      --accent: #2563eb;
      --done: #6b7280;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --card: #1f2937;
        --text: #f9fafb;
        --muted: #d1d5db;
        --border: #374151;
        --accent: #60a5fa;
        --done: #9ca3af;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 14px 48px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1;
      margin: -20px -14px 18px;
      padding: 18px 14px 14px;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .progress {
      color: var(--muted);
      font-size: 0.95rem;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--text);
      padding: 9px 12px;
      font: inherit;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }

    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin: 12px 0;
      box-shadow: 0 1px 2px rgb(0 0 0 / 0.04);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li + li { border-top: 1px solid var(--border); }

    label {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 11px 2px;
      min-height: 44px;
      cursor: pointer;
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-top: 1px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    label span { flex: 1; }

    input[type="checkbox"]:checked + span {
      color: var(--done);
      text-decoration: line-through;
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Liste de courses — semaine</h1>
      <div class="toolbar">
        <div class="progress" id="progress">0 / 0 cochés</div>
        <button type="button" id="reset">Tout décocher</button>
      </div>
      <p class="hint">Les cases cochées sont sauvegardées automatiquement dans ce navigateur.</p>
    </header>

    <section>
      <h2>Fruits & légumes</h2>
      <ul>
        <li><label><input type="checkbox" data-item="brocoli"><span>Brocoli — 1 gros ou 2 petits</span></label></li>
        <li><label><input type="checkbox" data-item="carottes"><span>Carottes — environ 1,5 kg</span></label></li>
        <li><label><input type="checkbox" data-item="champignons"><span>Champignons — 500 g</span></label></li>
        <li><label><input type="checkbox" data-item="haricots-petits-pois"><span>Haricots verts ou petits pois — 600 g, frais ou surgelés</span></label></li>
        <li><label><input type="checkbox" data-item="patates-douces"><span>Patates douces — 2 grosses, environ 700–800 g</span></label></li>
        <li><label><input type="checkbox" data-item="pommes-de-terre"><span>Pommes de terre — 1,2 à 1,5 kg</span></label></li>
        <li><label><input type="checkbox" data-item="epinards"><span>Épinards — 500 g frais ou 400 g surgelés</span></label></li>
        <li><label><input type="checkbox" data-item="tomates-cerises"><span>Tomates cerises — 500 g</span></label></li>
        <li><label><input type="checkbox" data-item="courgettes"><span>Courgettes — 2</span></label></li>
        <li><label><input type="checkbox" data-item="chou-fleur"><span>Chou-fleur — 1 gros</span></label></li>
        <li><label><input type="checkbox" data-item="legumes-pizza"><span>Légumes pour pizza — au choix : champignons, courgette, poivron doux, tomates</span></label></li>
      </ul>
    </section>

    <section>
      <h2>Frais / fromages / œufs</h2>
      <ul>
        <li><label><input type="checkbox" data-item="fromage-rape"><span>Fromage râpé — 300 à 400 g</span></label></li>
        <li><label><input type="checkbox" data-item="feta-chevre"><span>Feta ou chèvre frais — 200 g</span></label></li>
        <li><label><input type="checkbox" data-item="mozzarella"><span>Mozzarella — 2 boules</span></label></li>
        <li><label><input type="checkbox" data-item="oeufs"><span>Œufs — 8 à 10</span></label></li>
        <li><label><input type="checkbox" data-item="creme"><span>Crème fraîche ou crème végétale — 40 cl</span></label></li>
        <li><label><input type="checkbox" data-item="lait"><span>Lait — 50 cl</span></label></li>
        <li><label><input type="checkbox" data-item="quenelles"><span>Quenelles — 6 à 8 selon taille</span></label></li>
      </ul>
    </section>

    <section>
      <h2>Épicerie salée</h2>
      <ul>
        <li><label><input type="checkbox" data-item="pates"><span>Pâtes — 500 g</span></label></li>
        <li><label><input type="checkbox" data-item="orge-epeautre"><span>Orge perlé ou petit épeautre — 400 g</span></label></li>
        <li><label><input type="checkbox" data-item="lentilles-corail"><span>Lentilles corail — 300 g</span></label></li>
        <li><label><input type="checkbox" data-item="pois-chiches"><span>Pois chiches — 3 boîtes</span></label></li>
        <li><label><input type="checkbox" data-item="riz"><span>Riz — 400 à 500 g</span></label></li>
        <li><label><input type="checkbox" data-item="sauce-tomate"><span>Sauce tomate / coulis de tomate — 2 bouteilles ou briques</span></label></li>
        <li><label><input type="checkbox" data-item="pain-tartines"><span>Pain pour tartines — 1 pain ou 1 paquet de grandes tranches</span></label></li>
        <li><label><input type="checkbox" data-item="pate-pizza"><span>Pâte à pizza — 2 pâtes, ou farine + levure si maison</span></label></li>
        <li><label><input type="checkbox" data-item="olives"><span>Olives — 1 petit bocal, optionnel</span></label></li>
        <li><label><input type="checkbox" data-item="tofu-fume"><span>Tofu fumé — 1 bloc, optionnel pour la pizza ou le curry</span></label></li>
      </ul>
    </section>

    <section>
      <h2>Surgelés pratiques</h2>
      <ul>
        <li><label><input type="checkbox" data-item="petits-pois-surgeles"><span>Petits pois — 1 sachet si pas pris frais</span></label></li>
        <li><label><input type="checkbox" data-item="epinards-surgeles"><span>Épinards — si pas pris frais</span></label></li>
        <li><label><input type="checkbox" data-item="haricots-verts-surgeles"><span>Haricots verts — si pas pris frais</span></label></li>
      </ul>
    </section>

    <section>
      <h2>Placard / assaisonnement à vérifier</h2>
      <ul>
        <li><label><input type="checkbox" data-item="huile-olive"><span>Huile d’olive</span></label></li>
        <li><label><input type="checkbox" data-item="sel"><span>Sel</span></label></li>
        <li><label><input type="checkbox" data-item="poivre"><span>Poivre</span></label></li>
        <li><label><input type="checkbox" data-item="curry-doux"><span>Curry doux</span></label></li>
        <li><label><input type="checkbox" data-item="paprika-doux"><span>Paprika doux</span></label></li>
        <li><label><input type="checkbox" data-item="bouillon-legumes"><span>Bouillon de légumes</span></label></li>
        <li><label><input type="checkbox" data-item="muscade"><span>Muscade</span></label></li>
        <li><label><input type="checkbox" data-item="chapelure"><span>Chapelure — optionnel pour gratiner</span></label></li>
        <li><label><input type="checkbox" data-item="farine-maizena"><span>Farine ou maïzena — pour épaissir une sauce fromage si besoin</span></label></li>
      </ul>
    </section>

    <section>
      <h2>À ne pas racheter si déjà au placard</h2>
      <ul>
        <li><label><input type="checkbox" data-item="deja-riz"><span>Riz</span></label></li>
        <li><label><input type="checkbox" data-item="deja-pates"><span>Pâtes</span></label></li>
        <li><label><input type="checkbox" data-item="deja-lentilles-corail"><span>Lentilles corail</span></label></li>
        <li><label><input type="checkbox" data-item="deja-pois-chiches"><span>Pois chiches</span></label></li>
        <li><label><input type="checkbox" data-item="deja-sauce-tomate"><span>Sauce tomate</span></label></li>
        <li><label><input type="checkbox" data-item="deja-epices"><span>Épices</span></label></li>
        <li><label><input type="checkbox" data-item="deja-bouillon"><span>Bouillon</span></label></li>
        <li><label><input type="checkbox" data-item="deja-huile-olive"><span>Huile d’olive</span></label></li>
      </ul>
    </section>
  </main>

  <script>
    const storageKey = "liste-courses-semaine-v1";
    const checkboxes = Array.from(document.querySelectorAll('input[type="checkbox"][data-item]'));
    const progress = document.getElementById("progress");
    const reset = document.getElementById("reset");

    const readState = () => {
      try {
        return JSON.parse(localStorage.getItem(storageKey) || "{}");
      } catch {
        return {};
      }
    };

    const writeState = () => {
      const state = Object.fromEntries(checkboxes.map((checkbox) => [checkbox.dataset.item, checkbox.checked]));
      localStorage.setItem(storageKey, JSON.stringify(state));
      updateProgress();
    };

    const updateProgress = () => {
      const checked = checkboxes.filter((checkbox) => checkbox.checked).length;
      progress.textContent = `${checked} / ${checkboxes.length} cochés`;
    };

    const state = readState();
    checkboxes.forEach((checkbox) => {
      checkbox.checked = Boolean(state[checkbox.dataset.item]);
      checkbox.addEventListener("change", writeState);
    });

    reset.addEventListener("click", () => {
      checkboxes.forEach((checkbox) => { checkbox.checked = false; });
      writeState();
    });

    updateProgress();
  </script>
</body>
</html>
